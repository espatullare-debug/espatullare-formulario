<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Envio de Artes – Espatullare</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent:   #BA8FEE;
      --hover:    #9B6FE0;
      --light-bg: #F3ECFD;
      --deco:     #D4B5F7;
      --dark:     #26215C;
      --text:     #2D2D2D;
      --muted:    #6B6B8A;
      --border:   #E0D6F5;
      --white:    #FFFFFF;
      --error:    #D64545;
      --radius:   12px;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: #F8F5FF;
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Top bar ── */
    .topbar {
      background: var(--dark);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .topbar img { height: 48px; }

    /* ── Hero ── */
    .hero {
      background: linear-gradient(135deg, var(--dark) 0%, #3D2F7A 100%);
      color: var(--white);
      text-align: center;
      padding: 48px 24px 40px;
    }
    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      margin-bottom: 10px;
      letter-spacing: .5px;
    }
    .hero p {
      font-size: .95rem;
      color: var(--deco);
      max-width: 520px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* ── Main card ── */
    .container {
      max-width: 760px;
      margin: -24px auto 60px;
      padding: 0 16px;
    }
    .card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: 0 4px 32px rgba(38,33,92,.09);
      padding: 36px 36px 40px;
    }

    /* ── Section title ── */
    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      color: var(--dark);
      margin-bottom: 18px;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--deco);
    }

    /* ── Field ── */
    .field { margin-bottom: 20px; }
    .field label {
      display: block;
      font-size: .82rem;
      font-weight: 600;
      color: var(--dark);
      text-transform: uppercase;
      letter-spacing: .6px;
      margin-bottom: 6px;
    }
    .field label span.req { color: var(--accent); margin-left: 2px; }
    .field input[type="text"],
    .field input[type="email"],
    .field input[type="number"],
    .field select,
    .field textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-family: 'Montserrat', sans-serif;
      font-size: .93rem;
      color: var(--text);
      background: var(--white);
      transition: border .2s;
      outline: none;
    }
    .field input:focus, .field select:focus, .field textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(186,143,238,.15);
    }
    .field textarea { resize: vertical; min-height: 80px; }

    /* ── Image items ── */
    #imagens-wrapper { display: flex; flex-direction: column; gap: 20px; }

    .imagem-item {
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      background: var(--light-bg);
      position: relative;
      transition: border .2s;
    }
    .imagem-item.has-file { border-color: var(--accent); }

    .imagem-item-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .imagem-numero {
      font-weight: 700;
      font-size: .82rem;
      color: var(--dark);
      text-transform: uppercase;
      letter-spacing: .6px;
    }
    .btn-remover {
      background: none;
      border: 1.5px solid var(--error);
      color: var(--error);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: .78rem;
      font-family: 'Montserrat', sans-serif;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
    }
    .btn-remover:hover { background: var(--error); color: #fff; }

    /* upload zone */
    .upload-zone {
      border: 2px dashed var(--deco);
      border-radius: 8px;
      background: var(--white);
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: border .2s, background .2s;
      margin-bottom: 14px;
      position: relative;
    }
    .upload-zone:hover, .upload-zone.drag-over {
      border-color: var(--accent);
      background: #FAF6FF;
    }
    .upload-zone input[type="file"] {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      opacity: 0; cursor: pointer;
    }
    .upload-icon { font-size: 2rem; margin-bottom: 6px; }
    .upload-zone p { font-size: .83rem; color: var(--muted); }
    .upload-zone p strong { color: var(--accent); }

    .preview-img {
      max-width: 100%;
      max-height: 160px;
      border-radius: 6px;
      object-fit: cover;
      display: none;
      margin: 0 auto 10px;
    }
    .preview-name {
      font-size: .8rem;
      color: var(--muted);
      margin-bottom: 8px;
      display: none;
    }

    /* sub-fields inside item */
    .item-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    @media (max-width: 500px) { .item-fields { grid-template-columns: 1fr; } }

    .item-field label {
      display: block;
      font-size: .78rem;
      font-weight: 600;
      color: var(--dark);
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 5px;
    }
    .item-field label span.req { color: var(--accent); }
    .item-field input[type="number"],
    .item-field select {
      width: 100%;
      padding: 9px 12px;
      border: 1.5px solid var(--border);
      border-radius: 7px;
      font-family: 'Montserrat', sans-serif;
      font-size: .9rem;
      background: var(--white);
      outline: none;
      transition: border .2s;
    }
    .item-field input:focus, .item-field select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(186,143,238,.15);
    }

    /* tamanho hint */
    .tamanho-hint {
      margin-top: 10px;
      background: var(--white);
      border: 1.5px solid var(--deco);
      border-radius: 7px;
      padding: 8px 12px;
      font-size: .8rem;
      color: var(--dark);
      display: none;
    }

    /* ── Add button ── */
    .btn-add {
      display: flex;
      align-items: center;
      gap: 8px;
      background: none;
      border: 2px dashed var(--accent);
      color: var(--accent);
      border-radius: var(--radius);
      padding: 14px 20px;
      font-family: 'Montserrat', sans-serif;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      justify-content: center;
      transition: all .2s;
      margin-top: 4px;
    }
    .btn-add:hover { background: var(--light-bg); border-style: solid; }

    /* ── Divider ── */
    .divider { border: none; border-top: 1.5px solid var(--border); margin: 28px 0; }

    /* ── Submit ── */
    .btn-submit {
      width: 100%;
      padding: 15px;
      background: var(--accent);
      color: var(--dark);
      font-family: 'Montserrat', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background .2s, transform .1s;
      letter-spacing: .3px;
    }
    .btn-submit:hover:not(:disabled) { background: var(--hover); color: var(--white); }
    .btn-submit:active:not(:disabled) { transform: scale(.99); }
    .btn-submit:disabled { opacity: .6; cursor: not-allowed; }

    /* ── Progress / status ── */
    #status {
      display: none;
      margin-top: 18px;
      padding: 14px 18px;
      border-radius: 8px;
      font-size: .88rem;
      font-weight: 500;
      line-height: 1.5;
    }
    #status.loading { background: var(--light-bg); color: var(--dark); }
    #status.success { background: #EAF8F0; color: #1E6B45; border: 1.5px solid #A3DEC0; }
    #status.error   { background: #FEF0F0; color: var(--error); border: 1.5px solid #F5C0C0; }

    .progress-bar-wrap {
      width: 100%; height: 6px;
      background: var(--deco);
      border-radius: 99px;
      margin-top: 10px;
      overflow: hidden;
      display: none;
    }
    .progress-bar {
      height: 100%;
      background: var(--accent);
      border-radius: 99px;
      width: 0%;
      transition: width .3s;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 20px;
      font-size: .78rem;
      color: var(--muted);
    }
  </style>
</head>
<body>

<div class="topbar">
  <img src="https://d3ugyf2ht6aenh.cloudfront.net/stores/001/112/428/themes/common/logo-1296985148.png"
       alt="Espatullare" />
</div>

<div class="hero">
  <h1>Envio de Artes</h1>
  <p>Envie aqui as imagens que deseja estampar. Para cada imagem, informe a quantidade e o tamanho máximo desejado.</p>
</div>

<div class="container">
  <div class="card">

    <!-- Dados do cliente -->
    <p class="section-title">Seus dados</p>
    <div class="field">
      <label>Nome completo <span class="req">*</span></label>
      <input type="text" id="nome" placeholder="Maria da Silva" required />
    </div>
    <div class="field">
      <label>WhatsApp <span class="req">*</span></label>
      <input type="tel" id="whatsapp" placeholder="(48) 99999-9999" required />
    </div>
    <div class="field">
      <label>Observações gerais</label>
      <textarea id="obs" placeholder="Alguma informação adicional sobre o pedido?"></textarea>
    </div>

    <hr class="divider" />

    <!-- Imagens -->
    <p class="section-title">Artes para impressão</p>

    <div id="imagens-wrapper">
      <!-- itens adicionados dinamicamente -->
    </div>

    <button type="button" class="btn-add" id="btn-add">
      <span style="font-size:1.2rem">＋</span> Adicionar imagem
    </button>

    <hr class="divider" />

    <button type="button" class="btn-submit" id="btn-submit">Enviar artes</button>

    <div id="status"></div>
    <div class="progress-bar-wrap" id="progress-wrap">
      <div class="progress-bar" id="progress-bar"></div>
    </div>

  </div>
</div>

<footer>© Espatullare · Florianópolis, SC</footer>

<script>
  // ─── CONFIG ───────────────────────────────────────────────
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbybYL-LNx55cxmOjDsyXKLgoTPyvWB-oIVC4UwiEKnZpAvd01wZcx1M-ivY6-d4PSS4/exec';
  // ──────────────────────────────────────────────────────────

  let itemCount = 0;

  function criarItem() {
    itemCount++;
    const id = itemCount;
    const wrapper = document.getElementById('imagens-wrapper');

    const div = document.createElement('div');
    div.className = 'imagem-item';
    div.dataset.id = id;

    div.innerHTML = `
      <div class="imagem-item-header">
        <span class="imagem-numero">Imagem ${id}</span>
        ${id > 1 ? `<button type="button" class="btn-remover" onclick="removerItem(this)">Remover</button>` : ''}
      </div>

      <div class="upload-zone" id="zone-${id}">
        <input type="file" accept="image/*" onchange="handleFile(this, ${id})" />
        <div class="upload-icon">🖼️</div>
        <p>Clique ou arraste a imagem aqui<br/><strong>JPG, PNG ou WEBP</strong></p>
        <img class="preview-img" id="preview-${id}" />
        <div class="preview-name" id="fname-${id}"></div>
      </div>

      <div class="item-fields">
        <div class="item-field">
          <label>Quantidade <span class="req">*</span></label>
          <input type="number" id="qtd-${id}" min="1" placeholder="Ex: 10" />
        </div>
        <div class="item-field">
          <label>Limitar por <span class="req">*</span></label>
          <select id="eixo-${id}" onchange="atualizarHint(${id})">
            <option value="">Selecione…</option>
            <option value="largura">Largura máxima</option>
            <option value="altura">Altura máxima</option>
          </select>
        </div>
        <div class="item-field" style="grid-column: 1 / -1">
          <label>Medida em cm <span class="req">*</span></label>
          <input type="number" id="medida-${id}" min="1" step="0.5" placeholder="Ex: 8" onchange="atualizarHint(${id})" />
        </div>
      </div>

      <div class="tamanho-hint" id="hint-${id}"></div>
    `;

    wrapper.appendChild(div);
    setupDrag(div.querySelector('.upload-zone'));
  }

  function removerItem(btn) {
    const item = btn.closest('.imagem-item');
    item.remove();
    renumerar();
  }

  function renumerar() {
    document.querySelectorAll('.imagem-item').forEach((el, i) => {
      el.querySelector('.imagem-numero').textContent = `Imagem ${i + 1}`;
    });
  }

  function handleFile(input, id) {
    const file = input.files[0];
    if (!file) return;

    const zone   = document.getElementById(`zone-${id}`);
    const preview = document.getElementById(`preview-${id}`);
    const fname  = document.getElementById(`fname-${id}`);

    const reader = new FileReader();
    reader.onload = e => {
      preview.src = e.target.result;
      preview.style.display = 'block';
      fname.textContent = file.name;
      fname.style.display = 'block';
      zone.closest('.imagem-item').classList.add('has-file');
      // store base64 data on input element for later
      input.dataset.base64 = e.target.result;
      input.dataset.filename = file.name;
      input.dataset.type = file.type;
    };
    reader.readAsDataURL(file);
  }

  function atualizarHint(id) {
    const eixo  = document.getElementById(`eixo-${id}`).value;
    const medida = document.getElementById(`medida-${id}`).value;
    const hint  = document.getElementById(`hint-${id}`);

    if (eixo && medida) {
      const label = eixo === 'largura' ? 'Largura máxima' : 'Altura máxima';
      hint.textContent = `📐 ${label}: ${medida} cm`;
      hint.style.display = 'block';
    } else {
      hint.style.display = 'none';
    }
  }

  function setupDrag(zone) {
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
    zone.addEventListener('drop', e => {
      e.preventDefault();
      zone.classList.remove('drag-over');
      const input = zone.querySelector('input[type="file"]');
      if (e.dataTransfer.files.length) {
        input.files = e.dataTransfer.files;
        input.dispatchEvent(new Event('change'));
      }
    });
  }

  document.getElementById('btn-add').addEventListener('click', criarItem);

  // ── Envio ──────────────────────────────────────────────────────────────────
  document.getElementById('btn-submit').addEventListener('click', async () => {
    const nome      = document.getElementById('nome').value.trim();
    const whatsapp  = document.getElementById('whatsapp').value.trim();
    const obs       = document.getElementById('obs').value.trim();
    const btn       = document.getElementById('btn-submit');
    const status    = document.getElementById('status');

    if (!nome || !whatsapp) {
      mostrarStatus('Por favor, preencha seu nome e WhatsApp.', 'error');
      return;
    }

    const itens = document.querySelectorAll('.imagem-item');
    if (itens.length === 0) {
      mostrarStatus('Adicione ao menos uma imagem.', 'error');
      return;
    }

    const imagensPayload = [];
    let valido = true;

    itens.forEach((item, i) => {
      const input  = item.querySelector('input[type="file"]');
      const qtd    = item.querySelector(`[id^="qtd-"]`).value;
      const eixo   = item.querySelector(`[id^="eixo-"]`).value;
      const medida = item.querySelector(`[id^="medida-"]`).value;

      if (!input.dataset.base64) {
        mostrarStatus(`Imagem ${i + 1}: nenhuma imagem selecionada.`, 'error');
        valido = false; return;
      }
      if (!qtd || !eixo || !medida) {
        mostrarStatus(`Imagem ${i + 1}: preencha quantidade, eixo e medida.`, 'error');
        valido = false; return;
      }

      imagensPayload.push({
        base64:   input.dataset.base64,
        filename: input.dataset.filename,
        type:     input.dataset.type,
        quantidade: qtd,
        eixo:     eixo,
        medida:   medida
      });
    });

    if (!valido) return;

    btn.disabled = true;
    btn.textContent = 'Enviando…';
    mostrarStatus('⏳ Enviando suas artes… isso pode levar alguns instantes.', 'loading');
    setProgress(10);

    const payload = { nome, whatsapp, obs, imagens: imagensPayload };

    try {
      setProgress(30);
      const resp = await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      setProgress(90);
      const data = await resp.json();
      setProgress(100);

      if (data.status === 'ok') {
        mostrarStatus('✅ Artes enviadas com sucesso! Entraremos em contato em breve.', 'success');
        btn.textContent = 'Enviado ✓';
      } else {
        throw new Error(data.message || 'Erro desconhecido');
      }
    } catch (err) {
      mostrarStatus('❌ Erro ao enviar: ' + err.message, 'error');
      btn.disabled = false;
      btn.textContent = 'Enviar artes';
      setProgress(0);
    }
  });

  function mostrarStatus(msg, tipo) {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = tipo;
    el.style.display = 'block';
  }

  function setProgress(pct) {
    const wrap = document.getElementById('progress-wrap');
    const bar  = document.getElementById('progress-bar');
    wrap.style.display = pct > 0 ? 'block' : 'none';
    bar.style.width = pct + '%';
  }

  // Iniciar com 1 item
  criarItem();
</script>
</body>
</html>
